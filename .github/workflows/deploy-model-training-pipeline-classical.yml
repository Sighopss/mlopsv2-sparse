name: deploy-model-training-pipeline

on:
  push:
  workflow_dispatch:

jobs:
  set-env:
    runs-on: ubuntu-latest
    outputs:
      config-file: ${{ steps.set-output-defaults.outputs.config-file }}
    steps:
      - id: set-prod-branch
        name: Set prod branch
        if: ${{ github.ref == 'refs/heads/main' }}
        run: echo "config_env=config-infra-prod.yml" >> "$GITHUB_ENV"

      - id: set-dev-branch
        name: Set dev branch
        if: ${{ github.ref != 'refs/heads/main' }}
        run: echo "config_env=config-infra-dev.yml" >> "$GITHUB_ENV"

      - id: set-output-defaults
        name: Set output defaults
        run: echo "config-file=$config_env" >> "$GITHUB_OUTPUT"

  parse-config:
    needs: set-env
    runs-on: ubuntu-latest
    outputs:
      resource_group: ${{ steps.config.outputs.resource_group }}
      aml_workspace: ${{ steps.config.outputs.aml_workspace }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Parse config
        id: config
        uses: ./.github/actions/parse-config
        with:
          config-file: ${{ needs.set-env.outputs.config-file }}

  train:
    needs: [set-env, parse-config]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Register training data asset
        run: |
          az ml data create \
            --file mlops/azureml/train/data.yml \
            --resource-group ${{ needs.parse-config.outputs.resource_group }} \
            --workspace-name ${{ needs.parse-config.outputs.aml_workspace }}

      - name: Register training environment
        run: |
          az ml environment create \
            --file mlops/azureml/train/train-env.yml \
            --resource-group ${{ needs.parse-config.outputs.resource_group }} \
            --workspace-name ${{ needs.parse-config.outputs.aml_workspace }}

      - name: Create compute cluster
        run: |
          az ml compute create \
            --name cpu-cluster \
            --type amlcompute \
            --size Standard_DS3_v2 \
            --min-instances 0 \
            --max-instances 4 \
            --tier low_priority \
            --resource-group ${{ needs.parse-config.outputs.resource_group }} \
            --workspace-name ${{ needs.parse-config.outputs.aml_workspace }} \
            || true

      - name: Submit training pipeline
        run: |
          az ml job create \
            --file mlops/azureml/train/pipeline.yml \
            --resource-group ${{ needs.parse-config.outputs.resource_group }} \
            --workspace-name ${{ needs.parse-config.outputs.aml_workspace }}
