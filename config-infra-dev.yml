# Dev environment

# Global
namespace: mlopsv2 #Note: A namespace with many characters will cause storage account creation to fail due to storage account names having a limit of 24 characters.
postfix: "0001"
location: eastus
environment: dev
enable_aml_computecluster: true
enable_monitoring: false

# Pre-computed resource names
resource_group: rg-mlopsv2-0001dev
aml_workspace: mlw-mlopsv2-0001dev
application_insights: mlw-mlopsv2-0001dev
key_vault: kv-mlopsv2-0001dev
container_registry: crmlopsv20001dev
storage_account: stmlopsv20001dev

# Terraform backend settings
terraform_version: 1.3.6
terraform_workingdir: infrastructure
terraform_st_location: eastus
terraform_st_resource_group: rg-mlopsv2-0001dev-tf
terraform_st_storage_account: stmlopsv20001devtf
terraform_st_container_name: default
terraform_st_key: mlops-tab
